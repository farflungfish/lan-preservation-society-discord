name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ------------------------------------------------------------------
  # Markdown / documentation lint
  # ------------------------------------------------------------------
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

  # ------------------------------------------------------------------
  # Terraform checks (only when terraform/ or workflow files change)
  # ------------------------------------------------------------------
  terraform-fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.changed_files, 'terraform/') ||
      github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Terraform files
        id: check-tf
        run: |
          if [ -d terraform ] && find terraform -name "*.tf" | grep -q .; then
            echo "has_terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_terraform=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        if: steps.check-tf.outputs.has_terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Format Check
        if: steps.check-tf.outputs.has_terraform == 'true'
        working-directory: terraform
        run: terraform fmt -check -recursive -diff

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: terraform-fmt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Terraform files
        id: check-tf
        run: |
          if [ -d terraform ] && find terraform -name "*.tf" | grep -q .; then
            echo "has_terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_terraform=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        if: steps.check-tf.outputs.has_terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init (providers only)
        if: steps.check-tf.outputs.has_terraform == 'true'
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        if: steps.check-tf.outputs.has_terraform == 'true'
        working-directory: terraform
        env:
          DISCORD_TOKEN: "placeholder-for-validation"
        run: terraform validate

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    needs: terraform-fmt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Terraform files
        id: check-tf
        run: |
          if [ -d terraform ] && find terraform -name "*.tf" | grep -q .; then
            echo "has_terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_terraform=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup TFLint
        if: steps.check-tf.outputs.has_terraform == 'true'
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        if: steps.check-tf.outputs.has_terraform == 'true'
        working-directory: terraform
        run: tflint --init

      - name: Run TFLint
        if: steps.check-tf.outputs.has_terraform == 'true'
        working-directory: terraform
        run: tflint --format compact

  # ------------------------------------------------------------------
  # Terraform plan — runs against HCP Terraform and posts output as
  # a sticky PR comment so reviewers can see the diff inline.
  # ------------------------------------------------------------------
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [terraform-validate, tflint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Terraform files
        id: check-tf
        run: |
          if [ -d terraform ] && find terraform -name "*.tf" | grep -q .; then
            echo "has_terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_terraform=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        if: steps.check-tf.outputs.has_terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        if: steps.check-tf.outputs.has_terraform == 'true'
        working-directory: terraform
        env:
          TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}
        run: terraform init -input=false

      - name: Terraform Plan
        if: steps.check-tf.outputs.has_terraform == 'true'
        id: plan
        working-directory: terraform
        env:
          TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}
        # continue-on-error so the comment step always runs, even on plan failure;
        # the "Fail if plan failed" step re-surfaces the error afterwards.
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - name: Post plan as PR comment
        if: steps.check-tf.outputs.has_terraform == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-plan
          message: |
            ### 📋 Terraform Plan — `${{ steps.plan.outcome }}`

            <details><summary>Show plan output</summary>

            ```
            ${{ steps.plan.outputs.stdout }}${{ steps.plan.outputs.stderr }}
            ```

            </details>

      - name: Fail if plan failed
        if: steps.check-tf.outputs.has_terraform == 'true' && steps.plan.outcome == 'failure'
        run: exit 1
