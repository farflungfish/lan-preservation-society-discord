name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"

  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'apply' to confirm you want to run terraform apply"
        required: true

permissions:
  contents: read

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'apply')
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_CLOUD_ORGANIZATION: ${{ vars.TF_CLOUD_ORGANIZATION }}
      TF_VAR_discord_token: ${{ secrets.DISCORD_TOKEN }}
      TF_VAR_server_id: "1486014276274753697"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      # Full init — connects to Terraform Cloud for remote state.
      # Requires TF_API_TOKEN secret and TF_CLOUD_ORGANIZATION variable.
      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -input=false
