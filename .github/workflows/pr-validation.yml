name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ------------------------------------------------------------------
  # Markdown / documentation lint
  # ------------------------------------------------------------------
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
          config: |
            {
              "MD013": false,
              "MD033": false,
              "MD041": false
            }

  # ------------------------------------------------------------------
  # Terraform checks (only when terraform/ or workflow files change)
  # ------------------------------------------------------------------
  terraform-fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.changed_files, 'terraform/') ||
      github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Terraform files
        id: check-tf
        run: |
          if [ -d terraform ] && find terraform -name "*.tf" | grep -q .; then
            echo "has_terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_terraform=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        if: steps.check-tf.outputs.has_terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Format Check
        if: steps.check-tf.outputs.has_terraform == 'true'
        working-directory: terraform
        run: terraform fmt -check -recursive -diff

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: terraform-fmt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Terraform files
        id: check-tf
        run: |
          if [ -d terraform ] && find terraform -name "*.tf" | grep -q .; then
            echo "has_terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_terraform=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        if: steps.check-tf.outputs.has_terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init (providers only)
        if: steps.check-tf.outputs.has_terraform == 'true'
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        if: steps.check-tf.outputs.has_terraform == 'true'
        working-directory: terraform
        run: terraform validate

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    needs: terraform-fmt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Terraform files
        id: check-tf
        run: |
          if [ -d terraform ] && find terraform -name "*.tf" | grep -q .; then
            echo "has_terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_terraform=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup TFLint
        if: steps.check-tf.outputs.has_terraform == 'true'
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        if: steps.check-tf.outputs.has_terraform == 'true'
        working-directory: terraform
        run: tflint --init

      - name: Run TFLint
        if: steps.check-tf.outputs.has_terraform == 'true'
        working-directory: terraform
        run: tflint --format compact

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [terraform-validate, tflint]
    if: github.event_name == 'pull_request'
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_CLOUD_ORGANIZATION: ${{ vars.TF_CLOUD_ORGANIZATION }}
      TF_VAR_discord_token: ${{ secrets.DISCORD_TOKEN }}
      TF_VAR_server_id: "1486014276274753697"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Terraform files
        id: check-tf
        run: |
          if [ -d terraform ] && find terraform -name "*.tf" | grep -q .; then
            echo "has_terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_terraform=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        if: steps.check-tf.outputs.has_terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Check plan prerequisites
        id: prereqs
        run: |
          if [ "${{ steps.check-tf.outputs.has_terraform }}" != "true" ]; then
            echo "ready=skip" >> "$GITHUB_OUTPUT"
          elif [ -n "$TF_TOKEN_app_terraform_io" ] && \
               [ -n "$TF_CLOUD_ORGANIZATION" ] && \
               [ -n "$TF_VAR_discord_token" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Terraform plan skipped — configure TF_API_TOKEN, DISCORD_TOKEN, and TF_CLOUD_ORGANIZATION to enable plans."
          fi

      - name: Terraform Init
        if: steps.prereqs.outputs.ready == 'true'
        working-directory: terraform
        run: terraform init

      - name: Terraform Init (no backend)
        if: steps.prereqs.outputs.ready == 'false'
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Plan
        id: plan
        if: steps.prereqs.outputs.ready != 'skip'
        working-directory: terraform
        run: |
          if [ "${{ steps.prereqs.outputs.ready }}" != "true" ]; then
            {
              echo "⚠️ **Plan skipped** — secrets not yet configured."
              echo ""
              echo "To enable Terraform plans on pull requests, add the following to your repository:"
              echo "- **Secret** \`DISCORD_TOKEN\` — your Discord bot token"
              echo "- **Secret** \`TF_API_TOKEN\` — your Terraform Cloud API token"
              echo "- **Variable** \`TF_CLOUD_ORGANIZATION\` — your Terraform Cloud organization name"
            } > plan_output.txt
            echo "exitcode=0" >> "$GITHUB_OUTPUT"
          else
            terraform plan -no-color 2>&1 | tee plan_output.txt
            echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Post Plan Comment
        if: steps.prereqs.outputs.ready != 'skip'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = planOutput.length > maxLen
              ? planOutput.substring(0, maxLen) + '\n\n... (output truncated)'
              : planOutput;

            const exitCode = '${{ steps.plan.outputs.exitcode }}';
            const ready = '${{ steps.prereqs.outputs.ready }}';
            let status;
            if (ready === 'false') {
              status = '⏭️ Skipped (secrets not configured)';
            } else if (exitCode === '0') {
              status = '✅ No changes';
            } else if (exitCode === '2') {
              status = '⚠️ Changes pending';
            } else {
              status = '❌ Failed';
            }

            const body = [
              `## Terraform Plan — ${status}`,
              '',
              '<details>',
              '<summary>Show output</summary>',
              '',
              '```',
              truncated,
              '```',
              '',
              '</details>',
              '',
              `*Pusher: @${{ github.actor }} · Workflow: \`${{ github.workflow }}\`*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const comment of comments) {
              if (comment.body.startsWith('## Terraform Plan')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan errored
        if: steps.prereqs.outputs.ready == 'true' && steps.plan.outputs.exitcode == '1'
        run: exit 1
