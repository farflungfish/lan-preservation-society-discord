name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Markdown / documentation lint
  # ------------------------------------------------------------------
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
          config: |
            {
              "MD013": false,
              "MD033": false,
              "MD041": false
            }

  # ------------------------------------------------------------------
  # Terraform checks (only when terraform/ or workflow files change)
  # ------------------------------------------------------------------
  terraform-fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.changed_files, 'terraform/') ||
      github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Terraform files
        id: check-tf
        run: |
          if [ -d terraform ] && find terraform -name "*.tf" | grep -q .; then
            echo "has_terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_terraform=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        if: steps.check-tf.outputs.has_terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Format Check
        if: steps.check-tf.outputs.has_terraform == 'true'
        working-directory: terraform
        run: terraform fmt -check -recursive -diff

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: terraform-fmt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Terraform files
        id: check-tf
        run: |
          if [ -d terraform ] && find terraform -name "*.tf" | grep -q .; then
            echo "has_terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_terraform=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        if: steps.check-tf.outputs.has_terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init (providers only)
        if: steps.check-tf.outputs.has_terraform == 'true'
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        if: steps.check-tf.outputs.has_terraform == 'true'
        working-directory: terraform
        run: terraform validate

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    needs: terraform-fmt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Terraform files
        id: check-tf
        run: |
          if [ -d terraform ] && find terraform -name "*.tf" | grep -q .; then
            echo "has_terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_terraform=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup TFLint
        if: steps.check-tf.outputs.has_terraform == 'true'
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        if: steps.check-tf.outputs.has_terraform == 'true'
        working-directory: terraform
        run: tflint --init

      - name: Run TFLint
        if: steps.check-tf.outputs.has_terraform == 'true'
        working-directory: terraform
        run: tflint --format compact
