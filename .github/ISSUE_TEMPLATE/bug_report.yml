name: Bug Report
description: Report a problem with the Discord server or bot configuration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in as much detail as you can so we can investigate quickly.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: A short description of the problem.
      placeholder: e.g. #welcome channel shows an error message
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Join the server
        2. Go to #welcome
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happens?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information that might be helpful (screenshots, Discord version, etc.)
    validations:
      required: false
