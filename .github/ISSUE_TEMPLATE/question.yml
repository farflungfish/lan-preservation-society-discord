name: Question
description: Ask a question about the server or how to use it
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Not sure about something? Ask away! If you'd prefer a quicker answer, you can also ask in the `#general-chat` channel on Discord.
  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: e.g. How do I get the Member role after accepting the rules?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any extra details that might help us answer your question faster.
    validations:
      required: false
